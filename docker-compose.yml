services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas-app:latest
    container_name: atlas_app
    restart: always
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - atlas_storage:/var/www/html/storage
      - ./docker/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./docker/php-production.ini:/usr/local/etc/php/conf.d/zz-production.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - atlas-network

  nginx:
    image: nginx:alpine
    container_name: atlas_nginx
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
      - atlas_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - atlas-network

  mysql:
    image: mysql:8.0
    container_name: atlas_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-atlas}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas-app:latest
    container_name: atlas_queue
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3 --max-time=3600
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - atlas_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - atlas-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas-app:latest
    container_name: atlas_scheduler
    restart: always
    init: true
    command: php artisan schedule:work
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - atlas_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - atlas-network

networks:
  atlas-network:
    driver: bridge

volumes:
  db_data:
  atlas_storage: